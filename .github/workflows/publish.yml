name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (for example: 0.1.1)'
        required: false
        type: string
      tag:
        description: 'npm dist-tag to publish under'
        required: false
        default: latest
        type: choice
        options:
          - latest
          - next
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type-check
        run: npm run typecheck

  publish:
    runs-on: ubuntu-latest
    needs: test
    environment: npm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm version --no-git-tag-version --allow-same-version "${GITHUB_REF#refs/tags/v}"

      - name: Set version from input
        if: github.event.inputs.version
        run: npm version --no-git-tag-version --allow-same-version "${{ github.event.inputs.version }}"

      - name: Use npm README
        run: cp README.md README.github.bak && cp README.npm.md README.md

      - name: Publish to npm
        run: |
          TAG="${{ github.event.inputs.tag || 'latest' }}"
          npm publish --provenance --access public --tag "$TAG"
